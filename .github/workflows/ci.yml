# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Quotetion — GitHub Actions CI Workflow
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# This file tells GitHub to automatically run tests
# and verify builds whenever code is pushed or a
# pull request is created.
#
# File location: .github/workflows/ci.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Name ──
# This appears in the GitHub Actions tab
name: Quotetion CI

# ── Triggers ──
# When should this workflow run?
on:
  push:
    branches: [main]        # Run when code is pushed to main
  pull_request:
    branches: [main]        # Run when a PR targets main

# ── Jobs ──
# Each job runs independently on a fresh virtual machine
jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: Backend Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Installs backend dependencies and runs pytest
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest         # Use a free Ubuntu runner

    steps:
      # Step 1: Download the code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: 📦 Install backend dependencies
        run: pip install -r backend/requirements.txt

      # Step 4: Run tests
      # The env section shows how GitHub Secrets are accessed
      - name: ✅ Run pytest
        run: cd backend && pytest test_main.py -v
        env:
          MOTIVATION_API_KEY: ${{ secrets.MOTIVATION_API_KEY }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Frontend Verification
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Verifies the Streamlit app can import without errors
  frontend-verify:
    name: 🎨 Frontend Verify
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install frontend dependencies
        run: pip install -r frontend/requirements.txt

      # Verify the Streamlit app file has no syntax errors
      # and all imports resolve correctly
      - name: ✅ Verify Streamlit app syntax
        run: python -c "import py_compile; py_compile.compile('frontend/app.py', doraise=True)"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: Build Verification (Docker)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Builds Docker images and tests the health endpoint
  # Only runs AFTER Jobs 1 & 2 succeed
  build-verify:
    name: 🐳 Build Verify
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-verify]  # Wait for both jobs

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Build both Docker images
      - name: 🔨 Build backend Docker image
        run: docker build -t quotetion-backend ./backend

      - name: 🔨 Build frontend Docker image
        run: docker build -t quotetion-frontend ./frontend

      # Start backend and test the health endpoint
      - name: 🏥 Verify backend health endpoint
        run: |
          docker run -d -p 8000:8000 --name test-backend quotetion-backend
          sleep 5
          curl -f http://localhost:8000/health
          docker stop test-backend
